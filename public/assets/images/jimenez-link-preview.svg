    <circle cx="93" cy="142" r="36" fill="#070707" stroke="#ffaa00" stroke-width="7" />
    <circle cx="289" cy="142" r="36" fill="#070707" stroke="#ffaa00" stroke-width="7" />
    <path d="M57 135H328" stroke="rgba(255,255,255,0.5)" stroke-width="7" stroke-linecap="round" />
