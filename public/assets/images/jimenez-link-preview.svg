<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Jimenez Mobile Detailing link preview</title>
  <desc id="desc">A simple Jimenez Mobile Detailing preview card with the logo, headline, and phone number.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505" />
      <stop offset="0.48" stop-color="#101010" />
      <stop offset="1" stop-color="#1e0d06" />
    </linearGradient>
    <radialGradient id="orange-glow" cx="80%" cy="13%" r="64%">
      <stop offset="0" stop-color="#e15626" stop-opacity="0.72" />
      <stop offset="0.38" stop-color="#e15626" stop-opacity="0.22" />
      <stop offset="1" stop-color="#e15626" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#orange-glow)" />
  <path d="M735 0H1200V630H982L735 0Z" fill="#e15626" opacity="0.16" />

  <rect x="58" y="54" width="1084" height="522" rx="38" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.16)" />
  <rect x="82" y="80" width="1036" height="470" rx="30" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)" />

  <image href="../logo/JIMENEZ_Logo.svg" x="302" y="86" width="596" height="149" preserveAspectRatio="xMidYMid meet" />

  <text x="600" y="315" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="76" font-weight="900" text-anchor="middle" letter-spacing="0">PREMIUM MOBILE AUTO</text>
  <text x="600" y="395" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="76" font-weight="900" text-anchor="middle" letter-spacing="0">DETAILING IN THE PASO</text>
  <text x="600" y="475" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="76" font-weight="900" text-anchor="middle" letter-spacing="0">ROBLES AREA.</text>
  <text x="600" y="540" fill="#ffaa00" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" text-anchor="middle" letter-spacing="2">805-591-4562</text>
</svg>
