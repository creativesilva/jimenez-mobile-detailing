<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Jimenez Mobile Detailing link preview</title>
  <desc id="desc">A branded Jimenez Mobile Detailing preview card with the logo, orange and gold accents, and mobile detailing service text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505" />
      <stop offset="0.48" stop-color="#101010" />
      <stop offset="1" stop-color="#1e0d06" />
    </linearGradient>
    <radialGradient id="orange-glow" cx="80%" cy="13%" r="64%">
      <stop offset="0" stop-color="#e15626" stop-opacity="0.72" />
      <stop offset="0.38" stop-color="#e15626" stop-opacity="0.22" />
      <stop offset="1" stop-color="#e15626" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gold-glow" cx="7%" cy="88%" r="54%">
      <stop offset="0" stop-color="#ffaa00" stop-opacity="0.36" />
      <stop offset="0.44" stop-color="#ffaa00" stop-opacity="0.12" />
      <stop offset="1" stop-color="#ffaa00" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#orange-glow)" />
  <rect width="1200" height="630" fill="url(#gold-glow)" />
  <path d="M760 0H1200V630H1022L760 0Z" fill="#e15626" opacity="0.18" />
  <path d="M0 520C172 448 293 474 424 560C529 629 674 645 826 598C944 562 1059 555 1200 606V630H0Z" fill="#ffaa00" opacity="0.1" />

  <rect x="58" y="54" width="1084" height="522" rx="38" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.16)" />
  <rect x="82" y="80" width="1036" height="470" rx="30" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)" />

  <image href="../logo/JIMENEZ_Logo.png" x="105" y="82" width="470" height="118" preserveAspectRatio="xMidYMid meet" />

  <text x="920" y="130" fill="#ffaa00" font-family="Arial Black, Impact, sans-serif" font-size="28" font-weight="900" text-anchor="middle" letter-spacing="4">PASO ROBLES AREA</text>
  <rect x="782" y="154" width="276" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" />
  <text x="920" y="191" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="24" font-weight="900" text-anchor="middle">TEXT 805-591-4562</text>

  <text x="116" y="316" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="84" font-weight="900" letter-spacing="0">MOBILE AUTO</text>
  <text x="116" y="404" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="84" font-weight="900" letter-spacing="0">DETAILING</text>
  <text x="116" y="482" fill="#ffaa00" font-family="Arial Black, Impact, sans-serif" font-size="34" font-weight="900" letter-spacing="3">VETERAN OWNED | FULLY MOBILE</text>
  <text x="116" y="532" fill="#d8d8d8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Premium detailing brought to your driveway.</text>

